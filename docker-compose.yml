version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dermatoai-postgres
    environment:
      POSTGRES_USER: dermatoai
      POSTGRES_PASSWORD: dermatoai
      POSTGRES_DB: dermatoai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dermatoai"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: dermatoai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dermatoai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://dermatoai:dermatoai@postgres:5432/dermatoai
      DATABASE_URL_SYNC: postgresql://dermatoai:dermatoai@postgres:5432/dermatoai
      S3_ENDPOINT_URL: http://minio:9000
      STORAGE_TYPE: s3
    volumes:
      - backend_uploads:/app/uploads
      - model_data:/app/model
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  backend_uploads:
  model_data:
